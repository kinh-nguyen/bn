<footer class="site-footer h-card">
  <data class="u-url" href="{{ '/' | relative_url }}"></data>

  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col">
        {%- if site.author %}
          <p>{{ site.author | escape }}</p>
        {%- endif %}
        {%- if site.description %}
          <p>{{ site.description | escape }}</p>
        {%- endif %}
      </div>
    </div>
  </div>

  <div class="footer-skyline">
    <div class="footer-skyline__inner">
      <div class="footer-skyline__scene" id="footerParallax" aria-hidden="true">
        <div class="footer-skyline__layer footer-skyline__layer--back" data-depth-x="0.33">
          <img src="{{ '/assets/img/03_silhouette-hinten.svg' | relative_url }}" alt="" width="1600" height="220">
        </div>

        <div class="footer-skyline__layer" data-depth-x="0.66">
          <img src="{{ '/assets/img/02_silhouette-mitte.svg' | relative_url }}" alt="" width="1600" height="220">
        </div>

        <div class="footer-skyline__layer" data-depth-x="1">
          <img src="{{ '/assets/img/01_silhouette-vorne.svg' | relative_url }}" alt="" width="1600" height="220">
        </div>
      </div>
    </div>
  </div>

  <script src="{{ '/assets/js/footer-parallax.js' | relative_url }}"></script>
</footer>
